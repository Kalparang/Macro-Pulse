name: Daily Macro Pulse Report

on:
  schedule:
    # BEGIN GENERATED SCHEDULES
    # KR | 17:00 KST | 08:00 UTC | Mon-Fri
    - cron: '00 08 * * 1-5'
    # US | 06:30 KST | 21:30 UTC | Tue-Sat KST
    - cron: '30 21 * * 1-5'
    # END GENERATED SCHEDULES
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REPORT_FORMAT_CONFIG: config/report_formats.json
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PAGES_REPORT_URL: ${{ vars.PAGES_REPORT_URL || secrets.PAGES_REPORT_URL }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY || vars.FRED_API_KEY }}
      BLS_API_KEY: ${{ secrets.BLS_API_KEY || vars.BLS_API_KEY }}
      SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT || vars.SEC_USER_AGENT }}
      KRX_API_KEY: ${{ secrets.KRX_API_KEY || vars.KRX_API_KEY }}
      KRX_KOSPI_STOCK_DAILY_URL: ${{ vars.KRX_KOSPI_STOCK_DAILY_URL || secrets.KRX_KOSPI_STOCK_DAILY_URL }}
      KRX_KOSDAQ_STOCK_DAILY_URL: ${{ vars.KRX_KOSDAQ_STOCK_DAILY_URL || secrets.KRX_KOSDAQ_STOCK_DAILY_URL }}
      KRX_INDEX_KOSPI_URL: ${{ vars.KRX_INDEX_KOSPI_URL || secrets.KRX_INDEX_KOSPI_URL }}
      KRX_INDEX_KOSDAQ_URL: ${{ vars.KRX_INDEX_KOSDAQ_URL || secrets.KRX_INDEX_KOSDAQ_URL }}
      KRX_INDEX_KRX_URL: ${{ vars.KRX_INDEX_KRX_URL || secrets.KRX_INDEX_KRX_URL }}
      KRX_FUTURES_DAILY_URL: ${{ vars.KRX_FUTURES_DAILY_URL || secrets.KRX_FUTURES_DAILY_URL }}
      KRX_ETF_DAILY_URL: ${{ vars.KRX_ETF_DAILY_URL || secrets.KRX_ETF_DAILY_URL }}
      KRX_INVESTOR_FLOW_URL: ${{ vars.KRX_INVESTOR_FLOW_URL || secrets.KRX_INVESTOR_FLOW_URL }}
      OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY || vars.OPENDART_API_KEY }}
            
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Build runtime image
      run: docker build -t macro-pulse:daily .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Run Macro Pulse Bot in Docker
      run: |
        docker run --rm \
          -e REPORT_FORMAT_CONFIG \
          -e TELEGRAM_BOT_TOKEN \
          -e TELEGRAM_CHAT_ID \
          -e DISCORD_WEBHOOK_URL \
          -e PAGES_REPORT_URL \
          -e FRED_API_KEY \
          -e BLS_API_KEY \
          -e SEC_USER_AGENT \
          -e KRX_API_KEY \
          -e KRX_KOSPI_STOCK_DAILY_URL \
          -e KRX_KOSDAQ_STOCK_DAILY_URL \
          -e KRX_INDEX_KOSPI_URL \
          -e KRX_INDEX_KOSDAQ_URL \
          -e KRX_INDEX_KRX_URL \
          -e KRX_FUTURES_DAILY_URL \
          -e KRX_ETF_DAILY_URL \
          -e KRX_INVESTOR_FLOW_URL \
          -e OPENDART_API_KEY \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:daily \
          sh -lc "uv run --frozen python src/main.py 2>&1 | tee macro-pulse.log"
      
    - name: Validate generated report
      if: success()
      run: test -s macro_pulse_report.html

    - name: Prepare public directory
      if: success()
      run: |
        mkdir -p public
        mv macro_pulse_report.html public/index.html

    - name: Configure GitHub Pages
      if: success()
      uses: actions/configure-pages@v5

    - name: Upload GitHub Pages artifact
      if: success()
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./public

    - name: Upload workflow artifacts
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: daily-report-artifacts
        path: |
          macro_pulse_report.html
          public/index.html
          macro-pulse.log
          unit-test.log
        if-no-files-found: ignore

  deploy:
    if: ${{ needs.build.result == 'success' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  notify-failure:
    if: ${{ always() && (needs.build.result == 'failure' || needs.deploy.result == 'failure') }}
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Send failure notification
      if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
      run: |
        curl --silent --show-error --fail \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=Macro Pulse workflow failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
